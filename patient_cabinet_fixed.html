<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет пациента - BOT_MAX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: white;
            border-radius: 20px;
            padding: 20px 30px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            color: white;
        }
        .logout-btn {
            background: #f56565;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
        }
        .logout-btn:hover { background: #e53e3e; transform: translateY(-2px); }
        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .info-item {
            background: #f7fafc;
            padding: 15px;
            border-radius: 12px;
        }
        .info-label { font-weight: 600; color: #4a5568; font-size: 0.8em; text-transform: uppercase; }
        .info-value { font-size: 1.1em; color: #2d3748; margin-top: 5px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .edit-icon {
            cursor: pointer;
            background: #e2e8f0;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.7em;
        }
        .edit-icon:hover { background: #cbd5e0; }
        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-small { padding: 5px 12px; font-size: 0.8em; margin: 2px; }
        .btn-danger { background: #f56565; }
        .btn-warning { background: #ed8936; }
        .btn-info { background: #4299e1; }
        .symptom-item, .allergy-item, .vaccination-item, .medication-item, .diagnosis-item, .file-item {
            background: #f7fafc;
            padding: 12px 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .symptom-text, .allergy-text, .vaccination-text, .medication-text, .diagnosis-text { flex: 1; }
        .symptom-date { font-size: 0.7em; color: #718096; }
        .button-group { display: flex; gap: 5px; }
        textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1em;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        @media (max-width: 768px) {
            .info-grid { grid-template-columns: 1fr; }
            .header { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="user-info">
            <div class="avatar">👤</div>
            <div><strong>Иванов Иван Иванович</strong><br><small>ID: PAT-2026-001</small></div>
        </div>
        <button class="logout-btn" onclick="logout()">🚪 Выйти</button>
    </div>

    <div class="card">
        <h2>👤 Информация о пациенте</h2>
        <div class="info-grid">
            <div class="info-item"><div class="info-label">ФИО</div><div class="info-value">Иванов Иван Иванович</div></div>
            <div class="info-item"><div class="info-label">Дата рождения</div><div class="info-value">15.05.1990 (35 лет)</div></div>
            <div class="info-item">
                <div class="info-label">Рост/Вес</div>
                <div class="info-value">
                    <span id="heightValue">175</span> см / <span id="weightValue">80</span> кг
                    <span class="edit-icon" onclick="editHeightWeight()">✏️</span>
                </div>
            </div>
            <div class="info-item"><div class="info-label">ИМТ</div><div class="info-value" id="bmiValue">26.1 (Избыточный вес)</div></div>
            <div class="info-item">
                <div class="info-label">Артериальное давление</div>
                <div class="info-value">
                    <span id="bpSystolic">120</span> / <span id="bpDiastolic">80</span> мм рт.ст.
                    <span class="edit-icon" onclick="editBP()">✏️</span>
                </div>
            </div>
            <div class="info-item">
                <div class="info-label">Сатурация (SpO2)</div>
                <div class="info-value">
                    <span id="spo2Value">98</span> %
                    <span class="edit-icon" onclick="editSpO2()">✏️</span>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>📝 Добавить симптом</h2>
        <textarea id="symptomInput" rows="3" placeholder="Опишите симптом..."></textarea>
        <div style="display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap;">
            <button onclick="addSymptom()">💾 Сохранить симптом</button>
            <button onclick="addTemperature()">🌡️ Добавить температуру</button>
            <button onclick="startVoiceInput()" id="voiceBtn">🎤 Голосовой ввод</button>
        </div>
    </div>

    <div class="card">
        <h2>📋 Симптомы</h2>
        <div id="symptomsList"></div>
    </div>
</div>

<script>
    let patientData = {
        height: 175, weight: 80,
        bpSystolic: 120, bpDiastolic: 80,
        spo2: 98,
        symptoms: [
            {id:1,text:"Температура: 37.5°C, боль в горле, заложенность носа",date:"30.04.2026 15:45"},
            {id:2,text:"насморк утром в 7:00 и температура 38, снижали нурофен 5 мл однократно, в 10:00 боль в ухе слева, зеленые сопли",date:"28.05.2026, 10:09:20"},
            {id:3,text:"[28.05.2026 10:10] Температура: 38.0°C",date:"28.05.2026, 10:10:26"},
            {id:4,text:"[28.05.2026 10:10] Температура: 38.0°C снижали парацетамол",date:"28.05.2026, 10:10:54"}
        ]
    };

    function loadData() {
        const saved = localStorage.getItem('patientData');
        if(saved) patientData = JSON.parse(saved);
        updateAll();
    }

    function saveData() {
        localStorage.setItem('patientData', JSON.stringify(patientData));
        updateAll();
    }

    function updateAll() {
        updateBMI();
        updateSymptomsList();
        document.getElementById('heightValue').innerText = patientData.height;
        document.getElementById('weightValue').innerText = patientData.weight;
        document.getElementById('bpSystolic').innerText = patientData.bpSystolic;
        document.getElementById('bpDiastolic').innerText = patientData.bpDiastolic;
        document.getElementById('spo2Value').innerText = patientData.spo2;
    }

    function updateBMI() {
        const h = patientData.height / 100;
        const w = patientData.weight;
        const bmi = (w / (h * h)).toFixed(1);
        let status = "";
        if(bmi < 18.5) status = "Недостаточный вес";
        else if(bmi < 25) status = "Норма";
        else if(bmi < 30) status = "Избыточный вес";
        else status = "Ожирение";
        document.getElementById('bmiValue').innerHTML = `${bmi} (${status})`;
    }

    function editHeightWeight() {
        const h = prompt("Рост (см):", patientData.height);
        const w = prompt("Вес (кг):", patientData.weight);
        if(h && w) {
            patientData.height = parseFloat(h);
            patientData.weight = parseFloat(w);
            saveData();
        }
    }

    function editBP() {
        const s = prompt("Систолическое давление:", patientData.bpSystolic);
        const d = prompt("Диастолическое давление:", patientData.bpDiastolic);
        if(s && d) {
            patientData.bpSystolic = parseInt(s);
            patientData.bpDiastolic = parseInt(d);
            saveData();
        }
    }

    function editSpO2() {
        const v = prompt("Сатурация (%):", patientData.spo2);
        if(v && v >= 70 && v <= 100) {
            patientData.spo2 = parseInt(v);
            saveData();
        }
    }

    function addSymptom() {
        const text = document.getElementById('symptomInput').value.trim();
        if(text) {
            patientData.symptoms.unshift({
                id: Date.now(),
                text: text,
                date: new Date().toLocaleString()
            });
            saveData();
            document.getElementById('symptomInput').value = '';
        }
    }

    function addTemperature() {
        const temp = prompt("Температура (°C):");
        if(temp) {
            patientData.symptoms.unshift({
                id: Date.now(),
                text: `Температура: ${temp}°C`,
                date: new Date().toLocaleString()
            });
            saveData();
        }
    }

    function deleteSymptom(id) {
        if(confirm("Удалить симптом?")) {
            patientData.symptoms = patientData.symptoms.filter(s => s.id !== id);
            saveData();
        }
    }

    function updateSymptomsList() {
        const container = document.getElementById('symptomsList');
        container.innerHTML = patientData.symptoms.map(s => `
            <div class="symptom-item">
                <div class="symptom-text">
                    📝 ${escapeHtml(s.text)}<br>
                    <span class="symptom-date">${s.date}</span>
                </div>
                <div class="button-group">
                    <button class="btn-small btn-danger" onclick="deleteSymptom(${s.id})">🗑️</button>
                </div>
            </div>
        `).join('');
    }

    function startVoiceInput() {
        const btn = document.getElementById('voiceBtn');
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(!SpeechRecognition) {
            alert("Ваш браузер не поддерживает голосовой ввод");
            return;
        }
        const rec = new SpeechRecognition();
        rec.lang = 'ru-RU';
        btn.textContent = '🎤 Слушаю...';
        rec.onresult = (e) => {
            document.getElementById('symptomInput').value = e.results[0][0].transcript;
            btn.textContent = '🎤 Голосовой ввод';
        };
        rec.onerror = () => {
            btn.textContent = '🎤 Голосовой ввод';
            alert('Ошибка распознавания');
        };
        rec.start();
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function logout() {
        if(confirm('Выйти из личного кабинета?')) {
            window.location.href = '/';
        }
    }

    loadData();
</script>
</body>
</html>
